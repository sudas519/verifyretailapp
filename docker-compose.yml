version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    build:
      context: ./postgresql
      dockerfile: Dockerfile
    container_name: verifyretail-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retaildb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql/full_dump.sql:/docker-entrypoint-initdb.d/full_dump.sql
    networks:
      - verifyretail-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: verifyretail-backend
    environment:
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: retaildb
      
      # IBM Verify Configuration
      IBM_VERIFY_ISSUER: ${IBM_VERIFY_ISSUER:-https://emeabuildlab.verify.ibm.com/oidc/endpoint/default}
      IBM_VERIFY_CLIENT_ID: ${IBM_VERIFY_CLIENT_ID}
      IBM_VERIFY_CLIENT_SECRET: ${IBM_VERIFY_CLIENT_SECRET}
      IBM_VERIFY_CALLBACK_URL: ${IBM_VERIFY_CALLBACK_URL:-http://localhost:4000/api/auth/verify/callback}
      IBM_VERIFY_SCOPE: ${IBM_VERIFY_SCOPE:-openid profile email}
      
      # Application Configuration
      SESSION_SECRET: ${SESSION_SECRET:-generate_a_random_secret_here}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - verifyretail-network
    restart: unless-stopped

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000/api}
    container_name: verifyretail-frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    networks:
      - verifyretail-network
    restart: unless-stopped

networks:
  verifyretail-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

